services:
  php:
    image: yiisoftware/yii2-php:8.5-apache-latest
    command: bash -c "ln -sfn /app/public /app/web && apache2-foreground"
    volumes:
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      - ./:/app:delegated
    ports:
      - "8000:80"
    healthcheck:
      test: ["CMD-SHELL", "runuser -u www-data -- sh -c 'test -w /app/runtime && test -w /app/public/assets'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
